<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management | Monolith</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e9f0f5;
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            color: #1a2c3e;
        }
        .container { max-width: 1280px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .card-header {
            background: #2c4b6e;
            color: white;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .card-header h1 { font-weight: 600; font-size: 1.75rem; letter-spacing: -0.3px; }
        .btn {
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }
        .btn-primary { background: #2c6e4e; color: white; }
        .btn-primary:hover { background: #1e4f37; }
        .btn-warning { background: #e6a017; color: white; }
        .btn-danger { background: #b13e3e; color: white; }
        .btn-sm { padding: 0.3rem 0.9rem; font-size: 0.85rem; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }
        th { background: #f1f5f9; font-weight: 600; color: #1e293b; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
        }
        .form-group { margin-bottom: 1rem; }
        label { font-weight: 500; display: block; margin-bottom: 0.5rem; }
        input, select { width: 100%; padding: 0.7rem; border: 1px solid #cbd5e1; border-radius: 12px; font-family: inherit; }
        .search-bar { margin-bottom: 1.5rem; display: flex; gap: 0.5rem; }
        .search-bar input { flex: 1; }
        .action-btns { display: flex; gap: 0.5rem; }
        footer { text-align: center; margin-top: 2rem; color: #5b6e8c; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>📘 Student Management System</h1>
            <button class="btn btn-primary" onclick="openAddModal()">+ Add Student</button>
        </div>
        <div class="card-body" style="padding: 2rem;">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by name, email or course..." onkeyup="renderStudents()">
            </div>
            <div style="overflow-x: auto;">
                <table id="studentTable">
                    <thead>
                        <tr><th>ID</th><th>Name</th><th>Email</th><th>Course</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="studentList"></tbody>
                </table>
            </div>
        </div>
    </div>
  
</div>

<!-- Modal -->
<div id="studentModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Add Student</h2>
        <input type="hidden" id="editId">
        <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="e.g. Alice Johnson"></div>
        <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="alice@example.com"></div>
        <div class="form-group"><label>Course</label><input type="text" id="course" placeholder="Computer Science"></div>
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <button class="btn" style="background:#cbd5e1;" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveStudent()">Save</button>
        </div>
    </div>
</div>

<script>
    let students = JSON.parse(localStorage.getItem('students')) || [];
    let nextId = students.length ? Math.max(...students.map(s=>s.id)) + 1 : 1;

    function saveToLocal() { localStorage.setItem('students', JSON.stringify(students)); }

    function renderStudents() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        let filtered = students.filter(s => s.name.toLowerCase().includes(search) || s.email.toLowerCase().includes(search) || s.course.toLowerCase().includes(search));
        const tbody = document.getElementById('studentList');
        if(filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No students found</td></tr>';
            return;
        }
        tbody.innerHTML = filtered.map(s => `
            <tr>
                <td>${s.id}</td><td>${escapeHtml(s.name)}</td><td>${escapeHtml(s.email)}</td><td>${escapeHtml(s.course)}</td>
                <td class="action-btns">
                    <button class="btn btn-warning btn-sm" onclick="editStudent(${s.id})">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id})">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    function openAddModal() {
        document.getElementById('modalTitle').innerText = 'Add Student';
        document.getElementById('editId').value = '';
        document.getElementById('name').value = '';
        document.getElementById('email').value = '';
        document.getElementById('course').value = '';
        document.getElementById('studentModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('studentModal').style.display = 'none'; }

    function saveStudent() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const course = document.getElementById('course').value.trim();
        if(!name || !email || !course) { alert('Please fill all fields'); return; }
        if(id) { // edit
            const index = students.findIndex(s => s.id == id);
            if(index !== -1) { students[index] = { ...students[index], name, email, course }; }
        } else { // add
            students.push({ id: nextId++, name, email, course });
        }
        saveToLocal();
        renderStudents();
        closeModal();
    }

    function editStudent(id) {
        const student = students.find(s => s.id === id);
        if(student) {
            document.getElementById('modalTitle').innerText = 'Edit Student';
            document.getElementById('editId').value = student.id;
            document.getElementById('name').value = student.name;
            document.getElementById('email').value = student.email;
            document.getElementById('course').value = student.course;
            document.getElementById('studentModal').style.display = 'flex';
        }
    }

    function deleteStudent(id) {
        if(confirm('Permanently delete this student?')) {
            students = students.filter(s => s.id !== id);
            saveToLocal();
            renderStudents();
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }
    window.onload = () => { renderStudents(); };
    window.onclick = (e) => { if(e.target === document.getElementById('studentModal')) closeModal(); };
</script>
</body>
</html>
